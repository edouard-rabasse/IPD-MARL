# @package _global_
defaults:
  - override /agent: tabular_q
  - override /opponent: null

evolution:
  generations: 30
  match_steps: 7
  mutation_noise: 0.02
  survival_rate: 0.5
  num_opponents: 5
  population:
    - name: dqn
      count: 6
      train: true
      checkpoint: null
      config:
        lr: 0.001
        gamma: 0.99
        epsilon: 0.1
        memory_length: 3
        batch_size: 32
        buffer_capacity: 10000
        target_update_freq: 100

env:
  max_rounds: 7
  noise: 0.0

seed: 42
