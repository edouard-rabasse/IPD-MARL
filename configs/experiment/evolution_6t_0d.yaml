# @package _global_
defaults:
  - override /agent: tabular_q
  - override /opponent: null

evolution:
  generations: 30
  match_steps: 7
  mutation_noise: 0.02
  survival_rate: 0.5
  num_opponents: 5
  population:
    - name: tabular_q
      count: 6
      train: true
      checkpoint: null
      config:
        lr: 0.1
        gamma: 0.95
        epsilon: 0.1
        memory_length: 3

env:
  max_rounds: 7
  noise: 0.0

seed: 42
